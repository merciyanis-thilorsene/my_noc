services:
  device-monitor:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: lorawan-device-monitor:latest
    volumes:
      - monitor_data:/data
    environment:
      - PORT=8080
      - DATABASE_PATH=/data/monitor.db
      - WEBHOOK_SECRET_FILE=/run/secrets/webhook_secret
      - LOG_LEVEL=info
      - RETENTION_DAYS=180
      - CLEANUP_HOUR_UTC=3
    secrets:
      - webhook_secret
    networks:
      - proxy
    restart: unless-stopped
    # Routed by the existing Traefik under https://prototypes.merciyanis.dev/monitor.
    # Traefik strips the /monitor prefix so the backend serves at root; the frontend is
    # built with base=/monitor/ so the browser requests the prefixed URLs.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.monitor.entrypoints=web"
      - "traefik.http.routers.monitor.rule=Host(`prototypes.merciyanis.dev`) && PathPrefix(`/monitor`)"
      - "traefik.http.routers.monitor.middlewares=monitor-strip"
      - "traefik.http.middlewares.monitor-strip.stripprefix.prefixes=/monitor"
      - "traefik.http.services.monitor.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

# The monitor joins the existing stack's network (where Traefik lives) instead of
# publishing a host port.
networks:
  proxy:
    external: true
    name: root_default

secrets:
  webhook_secret:
    file: ./secrets/webhook_secret.txt

volumes:
  monitor_data:

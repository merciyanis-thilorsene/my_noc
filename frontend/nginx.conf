server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
  location = /config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location /assets/ {
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }
}
